<script src="/assets/js/lunr.js"></script>

<script>
{% assign counter = 0 %}
var documents = [{% for page in site.posts %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{ page.url }}",
    "title": "{{ page.title }}",
    "tags": "{{ page.tags | array_to_sentence_string }}",
    "date": "{{ page.date | date_to_string }}",
    "body": "{{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }{% if forloop.last %}{% else %}, {% endif %}{% endfor %}];

var idx = lunr(function () {
    this.ref('id')
    this.field('title')
    this.field('body')
    this.field('tags')

    documents.forEach(function (doc) {
        this.add(doc)
    }, this)
});
function search_item(result) {
  var ref = result['ref'];
  var url = documents[ref]['url'];
  var title = documents[ref]['title'];
  var tags = documents[ref]['tags'];
  var date = documents[ref]['date'];
  var body = documents[ref]['body'].substring(0,160)+'...';
  result_html = (
    "<li class='lunrsearchresult post'><a href=" + url + ">"
    + "<div class='post_title'>"
    + "<h2>" + title + "</h2>"
    + "<ul class='tag_box'><li class='date'>" + date + "</li></ul></div>"
    + "<p>" + body +"<p></a></li>")
  return result_html
}

function lunr_search(term) {
    document.getElementById('lunrsearchresults').innerHTML = '<ul></ul>';
    if(term) {
        document.getElementById('lunrsearchresults').innerHTML = "<p>Search results for '" + term + "'</p>" + document.getElementById('lunrsearchresults').innerHTML;
        //put results on the screen.
        var results = idx.search(term);
        if(results.length>0){
            //console.log(idx.search(term));
            //if results
            for (var i = 0; i < results.length; i++) {
                // more statements
                var result = results[i]
                document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML + search_item(result);
            }
        } else {
            document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = "<li class='lunrsearchresult'>No results found...</li>";
        }
    }
    return false;
}
</script>
<style>
    #lunrsearchresults {padding-top: 0.2rem;}
</style>

<div id="lunrsearchresults"">
    <ul></ul>
</div>

<script>
  const search_terms = new URLSearchParams(location.search);
  const search_query = search_terms.get('q')
  if (search_query) {
    document.getElementById('lunrsearch').value = search_query
    lunr_search(search_query);
  }
</script>
